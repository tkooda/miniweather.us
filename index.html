<script src="https://rainviewer.com/integration/map.js" async></script>

<style>
  .controls-container { display: inline-flex; align-items: center; gap: 8px; margin-left: 5px; }
  .gps-btn { background: none; border: none; cursor: pointer; padding: 2px 4px; display: flex; align-items: center; }
  .checkbox-label { font-family: sans-serif; font-size: 14px; cursor: pointer; display: inline-flex; align-items: center; gap: 4px; }
  .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: #fff; }
  .close-btn { position: absolute; top: 10px; right: 20px; font-size: 30px; cursor: pointer; z-index: 1001; }
  #loadingMsg { display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; color: #555; }
</style>

<body>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCILANmgIcwkai7OlOpUj03Jhp5yRXV48A&libraries=geocoding,places&loading=async&callback=initAutocomplete" async defer></script>

<script type="text/javascript">
// Utility Functions
String.prototype.replaceAt = function(index, replacement) {
    return this.substr(0, index) + replacement + this.substr(index + replacement.length);
}
function hideThunder(s) { return s.replaceAt(9, "0"); }
function showThunder(s) { return s.replaceAt(9, "1"); }
function hideSnow(s)    { return s.replaceAt(10, "0000"); }
function showSnow(s)    { return s.replaceAt(10, "1111"); }

let mapInstance = null;
let currentLat = null, currentLon = null;

// Modal Logic
function openRadarModal() {
    document.getElementById("radarModal").style.display = "block";
    initRainViewerDelayed();
}
function closeRadarModal() { document.getElementById("radarModal").style.display = "none"; }

function initRainViewerDelayed() {
    if (typeof RainViewerMap === 'undefined') {
        setTimeout(initRainViewerDelayed, 500);
        return;
    }
    if (!mapInstance && currentLat && currentLon) {
        document.getElementById("loadingMsg").style.display = "none";
        mapInstance = new RainViewerMap({
            lat: currentLat,
            lon: currentLon,
            zoom: 8,
            autoplay: true,
            layers: ['radar'] 
        });
    }
}

// Location Helpers
function fallbackToIPLocation() {
    fetch('https://ipapi.co/json/').then(r => r.json()).then(data => {
        if (data?.postal) {
            var url = new URL(window.location.href);
            url.search = ""; url.searchParams.set("zip", data.postal);
            window.location.href = url.href;
        }
    }).catch(err => console.error("IP Fallback failed."));
}

function redirect_to_zip_using_latlng(lat, lng) {
  if (typeof google === 'undefined' || typeof google.maps === 'undefined') {
      setTimeout(() => redirect_to_zip_using_latlng(lat, lng), 100);
      return;
  }
  new google.maps.Geocoder().geocode({ 'location': {lat, lng} }, function(results, status) {
    if (status === "OK") {
      let zipCode = results.flatMap(r => r.address_components).find(c => c.types.includes('postal_code'))?.long_name;
      if (zipCode) {
        var url = new URL(window.location.href);
        url.search = ""; url.searchParams.set("zip", zipCode);
        window.location.href = url.href;
      } else { fallbackToIPLocation(); }
    } else { fallbackToIPLocation(); }
  });
}

function initAutocomplete() {
  const autocomplete = new google.maps.places.Autocomplete(document.getElementById('autocomplete'), {types: ['geocode']});
  autocomplete.addListener('place_changed', () => {
    const place = autocomplete.getPlace();
    if (place.formatted_address) {
        new google.maps.Geocoder().geocode({ address: place.formatted_address, region: 'us' }, (results, status) => {
            if (status === 'OK') redirect_to_zip_using_latlng(results[0].geometry.location.lat(), results[0].geometry.location.lng());
        });
    }
  });

  const urlParams = new URLSearchParams(window.location.search);
  if (!urlParams.has("zip")) {
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        (p) => redirect_to_zip_using_latlng(p.coords.latitude, p.coords.longitude),
        () => fallbackToIPLocation(),
        { timeout: 5000 }
      );
    } else { fallbackToIPLocation(); }
  }
}

function manualGeolocate() {
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
        (p) => redirect_to_zip_using_latlng(p.coords.latitude, p.coords.longitude),
        () => fallbackToIPLocation(),
        { timeout: 5000 }
    );
  } else { fallbackToIPLocation(); }
}

const URL_BASE = "https://forecast.weather.gov/";

window.onload = function () {
  const urlParams = new URLSearchParams(window.location.search);
  
  // UI setup
  if (urlParams.get("thunder") !== null) document.getElementById("chkThunder").checked = (urlParams.get("thunder") === "1");
  if (urlParams.get("snow") !== null) document.getElementById("chkSnow").checked = (urlParams.get("snow") === "1");

  document.getElementById("chkThunder").addEventListener('change', (e) => { 
    var u = new URL(window.location.href); u.searchParams.set("thunder", e.target.checked ? "1" : "0"); window.location.href = u.href; 
  });
  document.getElementById("chkSnow").addEventListener('change', (e) => { 
    var u = new URL(window.location.href); u.searchParams.set("snow", e.target.checked ? "1" : "0"); window.location.href = u.href; 
  });

  // RESTORED: Inline geocoding logic for better performance
  document.getElementById("autocomplete").onkeydown = (e) => {
    if (e.keyCode === 13) { 
        new google.maps.Geocoder().geocode({ address: document.getElementById("autocomplete").value }, (results, status) => {
            if (status === 'OK') redirect_to_zip_using_latlng(results[0].geometry.location.lat(), results[0].geometry.location.lng());
        });
        return false; 
    }
  };
  
  if (urlParams.has("zip")) {
    const formData = new FormData(); formData.append('inputstring', urlParams.get("zip"));
    
    fetch(URL_BASE + "zipcity.php", { method: 'POST', body: formData })
    .then(r => r.text().then(text => ({ text, url: r.url })))
    .then(({text, url}) => {
        const urlParamsRedirected = new URLSearchParams(url.split("?")[1]);
        currentLat = parseFloat(urlParamsRedirected.get("lat"));
        currentLon = parseFloat(urlParamsRedirected.get("lon"));

        if (currentLat && currentLon) {
			document.getElementById("radarLinks").innerHTML =
				`<a href="https://radar.weather.gov/?center=${currentLat},${currentLon}&zoom=8" target="_blank">NWS</a> | ` +
				`<a href="https://www.windy.com/?radar,${currentLat},${currentLon},8" target="_blank">Windy</a> | ` +
                `<button onclick="openRadarModal()">Radar Popup</button>`;
        }
        
        let cityName = urlParamsRedirected.get("CityName") || "";
        let state = urlParamsRedirected.get("state") || "";
        if (!cityName) {
            const h2 = new DOMParser().parseFromString(text, 'text/html').querySelector("h2")?.textContent || "";
            const parts = h2.replace(/\s+/g, ' ').trim().split(', ');
            cityName = parts[0]; state = parts.length > 1 ? parts[1] : "";
        }
        document.getElementById("citystatezip").textContent = (cityName || "Location") + (state ? ", " + state : "") + " (" + urlParams.get("zip") + ") : ";
        
        return fetch(`${URL_BASE}MapClick.php?lat=${currentLat}&lon=${currentLon}&unit=0&lg=english&FcstType=graphical`);
    })
    .then(resp => resp?.text())
    .then(dataForecast => {
        if (!dataForecast) return;
        const doc = new DOMParser().parseFromString(dataForecast, 'text/html');
        const img = doc.querySelector("img[src*='meteograms/Plotter.php']");
        if (!img) return;
        
        let imgSrc = img.getAttribute('src');
        let fullImgUrl = imgSrc.startsWith('http') ? imgSrc : URL_BASE + imgSrc.replace(/^\//, '');
        const [base, query] = fullImgUrl.split('?');
        const params = new URLSearchParams(query);
        const pcmd = params.get("pcmd");
        
        const finalThunder = urlParams.get("thunder") !== null ? (urlParams.get("thunder") === "1") : (pcmd.charAt(9) === '1');
        const finalSnow = urlParams.get("snow") !== null ? (urlParams.get("snow") === "1") : (pcmd.substring(10, 14) !== '0000');
        
        document.getElementById("chkThunder").checked = finalThunder;
        document.getElementById("chkSnow").checked = finalSnow;
        
        let newPcmd = finalThunder ? showThunder(pcmd) : hideThunder(pcmd);
        newPcmd = finalSnow ? showSnow(newPcmd) : hideSnow(newPcmd);
        params.set("pcmd", newPcmd);

        document.getElementById("img1").src = base + "?" + params.toString();
        params.set("ahour", "48"); document.getElementById("img2").src = base + "?" + params.toString();
        params.set("ahour", "96"); document.getElementById("img3").src = base + "?" + params.toString();
    });
  }
}
</script>

<table width="100%">
<tr>
<td>
  <a href="/">MiniWeather.US</a> :
  <span id="citystatezip"></span>
  <input id="autocomplete" placeholder="Enter a city or zipcode" type="text" style="width:160px;"></input>
  
  <div class="controls-container">
    <button type="button" class="gps-btn" id="gpsBtn" onclick="manualGeolocate()" title="Use Current Location">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="#444">
        <path d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm8.94 3c-.46-4.17-3.77-7.48-7.94-7.94V1h-2v2.06C6.83 3.52 3.52 6.83 3.06 11H1v2h2.06c.46 4.17 3.77 7.48 7.94 7.94V23h2v-2.06c4.17-.46 7.48-3.77 7.94-7.94H23v-2h-2.06zM12 19c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7z"/>
      </svg>
    </button>
    <label class="checkbox-label"><input type="checkbox" id="chkThunder"> Show Thunder</label>
    <label class="checkbox-label"><input type="checkbox" id="chkSnow"> Show Snow</label>
  </div>
</td>
<td align="right" id="radarLinks"></td>
</tr>
</table>

<div id="radarModal" class="modal">
    <span class="close-btn" onclick="closeRadarModal()">&times;</span>
    <div id="loadingMsg">Loading Radar...</div>
    <div id="rainviewer-map" style="width: 100vw; height: 100vh;"></div>
</div>

<img id="img1" src="" width="100%"><br/><br/><br/><br/>
<img id="img2" src="" width="100%"><br/><br/><br/><br/>
<img id="img3" src="" width="100%"><br/><br/><br/><br/>

</body>
