<style>
  html, body { height: 100%; margin: 0; padding: 0; display: flex; flex-direction: column; font-family: sans-serif; font-size: 14px; }
  table, td, input[type="text"] { font-size: 12px; } /* Force inheritance to override mobile browser user-agent stylesheets */
  .controls-container { display: flex; flex-wrap: wrap; align-items: center; gap: 4px; margin-left: 5px; padding-bottom: 5px; margin-top: 3px; }
  .gps-btn { background: none; border: none; cursor: pointer; padding: 0 2px; display: flex; align-items: center; }
  .checkbox-label { font-size: 11px; cursor: pointer; display: inline-flex; align-items: center; gap: 2px; white-space: nowrap; }
  .checkbox-label input[type="checkbox"] { margin: 0; width: 12px; height: 12px; } /* Shrink physical checkboxes */
  
  /* Mobile: Horizontal scroll */
  @media (max-width: 767px) {
    .weather-images { 
      display: flex; 
      flex: 1; 
      overflow-x: auto; 
      overflow-y: hidden;
      -webkit-overflow-scrolling: touch; 
      touch-action: pan-x pan-y;
      min-height: 0;
    }
    .weather-images img { flex: 0 0 auto; height: 100%; width: auto; object-fit: contain; }
  }

  /* Desktop: Vertical stack with spacing */
  @media (min-width: 768px) {
    .weather-images { display: block; flex: 1; overflow-x: visible; }
    .weather-images img { width: 100%; height: auto; margin-bottom: 40px; display: block; }
  }
</style>

<body>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCILANmgIcwkai7OlOpUj03Jhp5yRXV48A&libraries=geocoding,places&loading=async&callback=initAutocomplete" async defer></script>

<script type="text/javascript">
// Utility Functions
String.prototype.replaceAt = function(index, replacement) {
    return this.substr(0, index) + replacement + this.substr(index + replacement.length);
}
// Bits: 2=HeatIndex, 5-7=Atmo, 8=Rain, 9=Thunder, 10=Snow
function hideHeatIndex(s) { return s.replaceAt(2, "0"); }
function hideAtmo(s)    { return s.replaceAt(5, "000"); }
function showAtmo(s)    { return s.replaceAt(5, "111"); }
function hideRain(s)    { return s.replaceAt(8, "0"); }
function showRain(s)    { return s.replaceAt(8, "1"); }
function hideThunder(s) { return s.replaceAt(9, "0"); }
function showThunder(s) { return s.replaceAt(9, "1"); }
function hideSnow(s)    { return s.replaceAt(10, "0000"); }
function showSnow(s)    { return s.replaceAt(10, "1000"); }

let currentLat = null, currentLon = null;

function fallbackToIPLocation() {
    fetch('https://ipapi.co/json/').then(r => r.json()).then(data => {
        if (data?.postal) {
            var url = new URL(window.location.href);
            url.search = ""; url.searchParams.set("zip", data.postal);
            window.location.href = url.href;
        }
    }).catch(err => console.error("IP Fallback failed."));
}

function redirect_using_latlng(lat, lng) {
    var url = new URL(window.location.href);
    url.search = "";
    url.searchParams.set("lat", lat.toFixed(4));
    url.searchParams.set("lon", lng.toFixed(4));
    window.location.href = url.href;
}

function initAutocomplete() {
  const autocomplete = new google.maps.places.Autocomplete(document.getElementById('autocomplete'), {types: ['geocode']});
  autocomplete.addListener('place_changed', () => {
    const place = autocomplete.getPlace();
    if (place.geometry && place.geometry.location) {
        redirect_using_latlng(place.geometry.location.lat(), place.geometry.location.lng());
    } else if (place.formatted_address) {
        new google.maps.Geocoder().geocode({ address: place.formatted_address, region: 'us' }, (results, status) => {
            if (status === 'OK') redirect_using_latlng(results[0].geometry.location.lat(), results[0].geometry.location.lng());
        });
    }
  });

  const urlParams = new URLSearchParams(window.location.search);
  if (!urlParams.has("zip") && (!urlParams.has("lat") || !urlParams.has("lon"))) {
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        (p) => redirect_using_latlng(p.coords.latitude, p.coords.longitude),
        () => fallbackToIPLocation(),
        { timeout: 5000 }
      );
    } else { fallbackToIPLocation(); }
  }
}

function manualGeolocate() {
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
        (p) => redirect_using_latlng(p.coords.latitude, p.coords.longitude),
        () => fallbackToIPLocation(),
        { timeout: 5000 }
    );
  } else { fallbackToIPLocation(); }
}

const URL_BASE = "https://forecast.weather.gov/";

window.onload = function () {
  const urlParams = new URLSearchParams(window.location.search);
  
  const chkSnow = document.getElementById("chkSnow");
  const chkRain = document.getElementById("chkRain");
  const chkAtmo = document.getElementById("chkAtmo");

  chkAtmo.checked = (urlParams.get("atmo") === "1");
  
  chkSnow.checked = (urlParams.has("snow") ? urlParams.get("snow") === "1" : true);
  chkRain.checked = (urlParams.has("rain") ? urlParams.get("rain") === "1" : true);

  [chkSnow, chkRain, chkAtmo].forEach(el => {
      el.addEventListener('change', (e) => {
          const key = e.target.id.replace('chk', '').toLowerCase();
          var u = new URL(window.location.href); 
          u.searchParams.set(key, e.target.checked ? "1" : "0"); 
          window.location.href = u.href; 
      });
  });

  document.getElementById("autocomplete").onkeydown = (e) => {
    if (e.keyCode === 13) { 
        new google.maps.Geocoder().geocode({ address: document.getElementById("autocomplete").value }, (results, status) => {
            if (status === 'OK') redirect_using_latlng(results[0].geometry.location.lat(), results[0].geometry.location.lng());
        });
        return false; 
    }
  };

  function fetchNWSData(lat, lon, preferredName) {
      if (lat && lon) {
          document.getElementById("radarLinks").innerHTML =
              `Radar: <a href="https://radar.weather.gov/?center=${lat},${lon}&zoom=8" target="_blank">NWS</a> | ` +
              `<a href="https://www.windy.com/?radar,${lat},${lon},8" target="_blank">Windy</a> | ` +
              `<a href="https://www.rainviewer.com/weather-radar-map-live.html?lat=${lat}&lon=${lon}&zoom=8" target="_blank">RainViewer</a>`;
      }

      // Use JSON endpoint for precision naming if preferredName is missing
      let namePromise = preferredName ? Promise.resolve(preferredName) : 
          fetch(`${URL_BASE}MapClick.php?lat=${lat}&lon=${lon}&FcstType=json`)
          .then(r => r.json())
          .then(data => {
              if (data && data.location && data.location.areaDescription) {
                  return data.location.areaDescription;
              }
              throw new Error("Missing JSON areaDescription");
          })
          .catch(() => {
              // HTML Fallback just in case JSON endpoint is temporarily down
              return fetch(`${URL_BASE}MapClick.php?lat=${lat}&lon=${lon}`)
              .then(r => r.text())
              .then(html => {
                  const doc = new DOMParser().parseFromString(html, 'text/html');
                  const headings = doc.querySelectorAll("h2, .panel-title, b");
                  for (let i = 0; i < headings.length; i++) {
                      let txt = headings[i].textContent.trim();
                      if (txt.toLowerCase().includes("extended forecast for")) {
                          let ext = txt.replace(/Extended Forecast for/ig, "").replace(/^[:\s]+/, "").trim();
                          if (ext) return ext;
                          let next = headings[i].nextSibling;
                          if (next && next.nodeType === 3) return next.nodeValue.trim();
                          if (next && next.nodeType === 1) return next.innerHTML.split(/<br/i)[0].replace(/<[^>]+>/g, '').trim();
                      }
                  }
                  return "Location";
              }).catch(() => "Location");
          });

      let forecastPromise = fetch(`${URL_BASE}MapClick.php?lat=${lat}&lon=${lon}&unit=0&lg=english&FcstType=graphical`)
          .then(r => r.text());

      Promise.all([namePromise, forecastPromise])
      .then(([locName, dataForecast]) => {
          if (!dataForecast) return;
          const doc = new DOMParser().parseFromString(dataForecast, 'text/html');
          
          const img = doc.querySelector("img[src*='meteograms/Plotter.php']");
          if (!img) return;

          document.getElementById("citystatezip").textContent = locName + " : ";
          
          let imgSrc = img.getAttribute('src');
          let fullImgUrl = imgSrc.startsWith('http') ? imgSrc : URL_BASE + imgSrc.replace(/^\//, '');
          const [base, query] = fullImgUrl.split('?');
          const params = new URLSearchParams(query);
          const pcmd = params.get("pcmd");
          
          let newPcmd = hideHeatIndex(pcmd);
          newPcmd = hideThunder(newPcmd);
          
          chkAtmo.checked = (urlParams.has("atmo") ? urlParams.get("atmo") === "1" : false);
          chkSnow.checked = (urlParams.has("snow") ? urlParams.get("snow") === "1" : (pcmd.charAt(10) === '1'));
          chkRain.checked = (urlParams.has("rain") ? urlParams.get("rain") === "1" : (pcmd.charAt(8) === '1'));
          
          newPcmd = chkSnow.checked ? showSnow(newPcmd) : hideSnow(newPcmd);
          newPcmd = chkRain.checked ? showRain(newPcmd) : hideRain(newPcmd);
          newPcmd = chkAtmo.checked ? showAtmo(newPcmd) : hideAtmo(newPcmd);
          params.set("pcmd", newPcmd);

          document.getElementById("img1").src = base + "?" + params.toString();
          params.set("ahour", "48"); document.getElementById("img2").src = base + "?" + params.toString();
          params.set("ahour", "96"); document.getElementById("img3").src = base + "?" + params.toString();
      });
  }

  if (urlParams.has("lat") && urlParams.has("lon")) {
      currentLat = urlParams.get("lat");
      currentLon = urlParams.get("lon");
      fetchNWSData(currentLat, currentLon, null);
  } else if (urlParams.has("zip")) {
      const formData = new FormData(); formData.append('inputstring', urlParams.get("zip"));
      
      fetch(URL_BASE + "zipcity.php", { method: 'POST', body: formData })
      .then(r => r.text().then(text => ({ text, url: r.url })))
      .then(({text, url}) => {
          const queryStr = url.includes("?") ? url.split("?")[1] : "";
          const urlParamsRedirected = new URLSearchParams(queryStr);
          
          // NWS redirect fallback parameters just in case
          currentLat = urlParamsRedirected.get("lat") || urlParamsRedirected.get("textField1");
          currentLon = urlParamsRedirected.get("lon") || urlParamsRedirected.get("textField2");

          let cityName = urlParamsRedirected.get("CityName") || "";
          let state = urlParamsRedirected.get("state") || "";
          
          // Original robust HTML fallback logic for the Zip flow
          if (!cityName && text) {
              const docZip = new DOMParser().parseFromString(text, 'text/html');
              const h2Text = docZip.querySelector("h2")?.textContent || "";
              const parts = h2Text.replace(/\s+/g, ' ').trim().split(',');
              cityName = parts[0] ? parts[0].trim() : "";
              state = parts.length > 1 ? parts[1].trim() : "";
          }

          let preferredName = null;
          if (cityName) {
              preferredName = cityName + (state ? ", " + state : "");
          }

          if (preferredName) {
              preferredName += " (" + urlParams.get("zip") + ")";
          } else {
              preferredName = "Location (" + urlParams.get("zip") + ")";
          }
          
          if (currentLat && currentLon) {
              fetchNWSData(currentLat, currentLon, preferredName);
          } else {
              document.getElementById("citystatezip").textContent = "Location Error: Could not resolve coordinates.";
          }
      });
  }
}
</script>

<table width="100%">
<tr>
<td>
  <a href="/">MiniWeather.US</a> :
  <span id="citystatezip"></span>
  <input id="autocomplete" placeholder="Enter a city or zipcode" type="text" style="width:160px;"></input>
  
  <div class="controls-container">
    <button type="button" class="gps-btn" id="gpsBtn" onclick="manualGeolocate()" title="Use Current Location">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="16" height="16" fill="#444">
        <path d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm8.94 3c-.46-4.17-3.77-7.48-7.94-7.94V1h-2v2.06C6.83 3.52 3.52 6.83 3.06 11H1v2h2.06c.46 4.17 3.77 7.48 7.94 7.94V23h2v-2.06c4.17-.46 7.48-3.77 7.94-7.94H23v-2h-2.06zM12 19c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7z"/>
      </svg>
    </button>
    <label class="checkbox-label"><input type="checkbox" id="chkSnow"> Snow</label>
    <label class="checkbox-label"><input type="checkbox" id="chkRain"> Rain</label>
    <label class="checkbox-label"><input type="checkbox" id="chkAtmo"> Atmosphere</label>
  </div>
</td>
<td align="right" id="radarLinks"></td>
</tr>
</table>

<div class="weather-images">
    <img id="img1" src="">
    <img id="img2" src="">
    <img id="img3" src="">
