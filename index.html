<body>

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.1.1/jquery.min.js"></script>
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCILANmgIcwkai7OlOpUj03Jhp5yRXV48A&libraries=geocoding,places&loading=async&callback=initAutocomplete" async defer></script>

<script type="text/javascript">

// utility functions to explicitly toggle thunder and snow bits
String.prototype.replaceAt = function(index, replacement) {
    return this.substr(0, index) + replacement + this.substr(index + replacement.length);
}
function hideThunder(s) { return s.replaceAt(9, "0"); }
function showThunder(s) { return s.replaceAt(9, "1"); }
function hideSnow(s)    { return s.replaceAt(10, "0000"); }
function showSnow(s)    { return s.replaceAt(10, "1111"); }

// redirect to "?zip=$zip" using latitude + longitude ..
function redirect_to_zip_using_latlng( lat, lng ) {
  const geocoder = new google.maps.Geocoder();
  const latlng = new google.maps.LatLng( lat, lng );
  
  geocoder.geocode( { 'location': latlng }, function(results, status) {
    if ( status == "OK" ) {
      if ( results[ 0 ] ) {
        for (var i = 0; i < results[0].address_components.length; i++) {
          for (var j = 0; j < results[0].address_components[i].types.length; j++) {
            if (results[0].address_components[i].types[j] === 'postal_code') {
              var zipCode = results[0].address_components[i].long_name;
              var url = new URL(window.location.href);
              
              // Only set zip. Drop thunder/snow params so the new location defaults to NWS data.
              url.search = ""; 
              url.searchParams.set("zip", zipCode);
              window.location.href = url.href;
              return false; 
            }
          }
        }
      }
    } else {
      console.error('Geocode was not successful for the following reason: ' + status);
    }
  });
}

// redirect to /zip/$zip using (e.g.) "city, state, country" ..
function redirect_to_zip_using_address( address ) {
  const geocoder = new google.maps.Geocoder();
  const request = {
    address: address,
    region: 'us'
  };
  
  geocoder.geocode( request, ( results, status ) => {
    if ( status === 'OK' ) {
      redirect_to_zip_using_latlng( results[ 0 ].geometry.location.lat(), results[ 0 ].geometry.location.lng() );
    } else {
      console.error('Geocode was not successful for the following reason: ' + status);
    }
  });
}

function initAutocomplete() {
  autocomplete = new google.maps.places.Autocomplete(
    /** @type {!HTMLInputElement} */(document.getElementById('autocomplete')),
    {types: ['geocode']}
  );
  autocomplete.addListener('place_changed', processAddress);
}

function processAddress() {
  const componentForm = {
    street_number: 'short_name',
    route: 'long_name',
    locality: 'long_name',
    administrative_area_level_1: 'short_name',
    country: 'long_name',
    postal_code: 'short_name'
  };
  
  var place = autocomplete.getPlace();
  if ( ! place.address_components ) return;
  
  var city = "";
  var state = "";
  var country = "";
  for (var i = 0; i < place.address_components.length; i++) {
    var addressType = place.address_components[i].types[0];
    if (componentForm[addressType]) {
      var val = place.address_components[i][componentForm[addressType]];
      if ( addressType == 'locality' ) {
        city = val;
      } else if ( addressType == 'administrative_area_level_1' ) {
        state = val
      } else if ( addressType == 'country' ) {
        country = val
      }
    }
  }
  redirect_to_zip_using_address( city + ", " + state + ", " + country );
}

function manualGeolocate() {
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(function(position) {
      redirect_to_zip_using_latlng( position.coords.latitude, position.coords.longitude );
    });
  }
}

// Safely biases the Google Maps Autocomplete without triggering permission prompts
function safeBiasGeolocate() {
  if (navigator.geolocation && navigator.permissions) {
    navigator.permissions.query({name: 'geolocation'}).then(function(result) {
      if (result.state === 'granted') {
        navigator.geolocation.getCurrentPosition(function(position) {
          const geolocation = {
            lat: position.coords.latitude,
            lng: position.coords.longitude
          };
          if (autocomplete) {
            const circle = new google.maps.Circle({
              center: geolocation,
              radius: position.coords.accuracy
            });
            autocomplete.setBounds(circle.getBounds());
          }
        });
      }
    });
  }
}

// Checkbox event logic now forces explicit "1" or "0"
function toggleQueryParam(param, isChecked) {
  var url = new URL(window.location.href);
  url.searchParams.set(param, isChecked ? "1" : "0");
  window.location.href = url.href;
}

// main()..
const URL_BASE = "https://forecast.weather.gov/";
const urlParamsBase = new URLSearchParams( window.location.search );
var autocomplete; // global

window.onload = function () {
  
  // 1. Read URL overrides (returns null if user hasn't explicitly interacted yet)
  const userThunder = urlParamsBase.get("thunder");
  const userSnow = urlParamsBase.get("snow");

  // Pre-check boxes ONLY if explicitly forced via URL before NWS data loads
  if (userThunder !== null) document.getElementById("chkThunder").checked = (userThunder === "1");
  if (userSnow !== null) document.getElementById("chkSnow").checked = (userSnow === "1");

  // Bind UI Checkbox change events
  document.getElementById("chkThunder").addEventListener('change', function() {
    toggleQueryParam("thunder", this.checked);
  });
  document.getElementById("chkSnow").addEventListener('change', function() {
    toggleQueryParam("snow", this.checked);
  });

  document.getElementById("autocomplete").onkeydown = function (e) {
    if ( e.keyCode === 13 ) {
      redirect_to_zip_using_address( document.getElementById("autocomplete").value );
      return false;
    }
  }
  
  if ( urlParamsBase.has("zip") ) {
    var xhr = new XMLHttpRequest(); 
    $.ajax( { url: URL_BASE + "zipcity.php",
              type: "POST",
              data: { inputstring: urlParamsBase.get("zip") },
              xhr: function() { return xhr; },
              success: function( dataCity ) {
                pathForecast = $( dataCity ).find( "img[src='newimages/medium/hourlyweather.png']" ).closest("a").attr("href");
                var urlParamsRedirected = new URLSearchParams( xhr.responseURL.split("?")[1] );
                
                $("#radar").html( "<a href='https://www.weatherbug.com/maps/?layerId=Radar.Global&center=" + urlParamsRedirected.get( "lat" ) + "," + urlParamsRedirected.get( "lon" ) + "'>Live Radar</a>" );
                $("#citystatezip").html( urlParamsRedirected.get( "CityName" ) + ", " + urlParamsRedirected.get( "state" ) + " (" + urlParamsBase.get("zip") + ") : " );
                
                $.get( URL_BASE + pathForecast, function( dataForecast ) {
                     path_img_orig = $( dataForecast ).find( "img[src*='meteograms/Plotter.php']" ).attr("src");
                     path_img_array = path_img_orig.split('?');
                     var urlParamsImg = new URLSearchParams( path_img_array[1] );
                     
                     var pcmd = urlParamsImg.get("pcmd");
                     
                     // 2. Determine native NWS defaults from the raw string
                     var nwsThunder = pcmd.charAt(9) === '1';
                     var nwsSnow = pcmd.substring(10, 14) !== '0000'; // Any non-zero here means snow/sleet is natively present
                     
                     // 3. Resolve final states: Explicit URL overrides take precedence, otherwise fallback to NWS
                     var finalThunder = userThunder !== null ? (userThunder === "1") : nwsThunder;
                     var finalSnow = userSnow !== null ? (userSnow === "1") : nwsSnow;
                     
                     // 4. Dynamically update UI checkboxes so the user sees the true state
                     document.getElementById("chkThunder").checked = finalThunder;
                     document.getElementById("chkSnow").checked = finalSnow;
                     
                     // 5. Apply final states to the pcmd string
                     pcmd = finalThunder ? showThunder(pcmd) : hideThunder(pcmd);
                     pcmd = finalSnow ? showSnow(pcmd) : hideSnow(pcmd);
                     
                     urlParamsImg.set("pcmd", pcmd);

                     $("#img1").attr( "src", URL_BASE + path_img_array[0] + "?" + urlParamsImg.toString() );
                     urlParamsImg.set( "ahour", "48" );
                     $("#img2").attr( "src", URL_BASE + path_img_array[0] + "?" + urlParamsImg.toString() );
                     urlParamsImg.set( "ahour", "96" );
                     $("#img3").attr( "src", URL_BASE + path_img_array[0] + "?" + urlParamsImg.toString() );
                 });
              }
            });

  } else {
    // Attempt background geolocation on the homepage if permitted
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(function(position) {
            redirect_to_zip_using_latlng( position.coords.latitude, position.coords.longitude );
        });
    }
  }
}
</script>

<table width="100%">
<tr>
<td>
  <a href="/">MiniWeather.US</a> :
  <span id="citystatezip"></span>
  <input id="autocomplete" placeholder="Enter a city or zipcode" type="text" style="width:160px;" onfocus="safeBiasGeolocate()"></input>
  
  <div class="controls-container">
    <button type="button" class="gps-btn" onclick="manualGeolocate()" title="Use Current Location">

      </svg>
    </button>
    <label class="checkbox-label"><input type="checkbox" id="chkThunder"> Show Thunder</label>
    <label class="checkbox-label"><input type="checkbox" id="chkSnow"> Show Snow</label>
  </div>
</td>

</tr>
